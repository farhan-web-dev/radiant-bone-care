# Supabase local development configuration.
# See https://supabase.com/docs/guides/cli/config

project_id = "buhpebhatqsxfnuvcblb"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/admin", "http://localhost:5173/booking/success", "http://localhost:5173/booking/cancel"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true

[functions.stripe-webhook]
verify_jwt = false

